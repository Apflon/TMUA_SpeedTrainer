<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TMUA Speed Trainer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600;9..144,700;9..144,800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4f1ea; --bg-dark: #1a1814; --ink: #1a1814; --paper: #faf7f0;
    --accent: #c8553d; --accent-2: #5e8d6f; --gold: #d4a04c;
    --muted: #8a8478; --border: #d8d2c4; --shadow: rgba(26, 24, 20, 0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Fraunces', Georgia, serif;
    background: var(--bg); color: var(--ink); min-height: 100vh;
    background-image:
      radial-gradient(at 15% 20%, rgba(212, 160, 76, 0.08) 0px, transparent 50%),
      radial-gradient(at 85% 80%, rgba(94, 141, 111, 0.08) 0px, transparent 50%);
    line-height: 1.5;
  }
  .container { max-width: 880px; margin: 0 auto; padding: 40px 28px; }
  header {
    border-bottom: 1px solid var(--border); padding-bottom: 24px;
    margin-bottom: 40px; display: flex; justify-content: space-between;
    align-items: flex-end; flex-wrap: wrap; gap: 12px;
  }
  .logo { font-weight: 700; font-size: 32px; letter-spacing: -0.02em; font-style: italic; }
  .logo span { color: var(--accent); }
  .tag { font-family: 'JetBrains Mono', monospace; font-size: 11px;
    text-transform: uppercase; letter-spacing: 0.15em; color: var(--muted); }
  .screen { display: none; animation: fadein 0.4s ease; }
  .screen.active { display: block; }
  @keyframes fadein { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .intro { margin-bottom: 36px; }
  .intro h1 { font-size: 52px; font-weight: 600; line-height: 1.05;
    letter-spacing: -0.03em; margin-bottom: 14px; }
  .intro h1 em { font-style: italic; color: var(--accent); font-weight: 400; }
  .intro p { font-size: 18px; color: var(--muted); max-width: 560px; }

  .section-label {
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    text-transform: uppercase; letter-spacing: 0.18em; color: var(--muted);
    margin-bottom: 16px; display: flex; align-items: center; gap: 12px;
  }
  .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .categories { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 14px; margin-bottom: 40px; }
  .cat-card {
    background: var(--paper); border: 1px solid var(--border); padding: 22px 20px;
    cursor: pointer; transition: all 0.25s ease; text-align: left;
    font-family: inherit; color: var(--ink); position: relative; overflow: hidden;
  }
  .cat-card:hover { border-color: var(--ink); transform: translateY(-2px); box-shadow: 0 10px 30px var(--shadow); }
  .cat-card::before {
    content: ''; position: absolute; top: 0; left: 0; width: 3px; height: 100%;
    background: var(--accent); transform: scaleY(0); transform-origin: top;
    transition: transform 0.3s ease;
  }
  .cat-card:hover::before { transform: scaleY(1); }
  .cat-num { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted); letter-spacing: 0.1em; }
  .cat-name { font-size: 22px; font-weight: 500; margin: 8px 0 4px; letter-spacing: -0.01em; }
  .cat-desc { font-size: 13px; color: var(--muted); font-family: 'JetBrains Mono', monospace; }

  .progress-section { background: var(--paper); border: 1px solid var(--border); padding: 24px; }
  .progress-section h2 { font-size: 24px; font-weight: 500; font-style: italic; margin-bottom: 16px; }
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 16px; }
  .stat { border-left: 2px solid var(--accent); padding-left: 12px; }
  .stat-label { font-family: 'JetBrains Mono', monospace; font-size: 10px;
    text-transform: uppercase; letter-spacing: 0.15em; color: var(--muted); }
  .stat-value { font-size: 28px; font-weight: 500; margin-top: 4px; }
  .empty-stats { color: var(--muted); font-style: italic; font-size: 15px; }
  .clear-btn {
    background: none; border: 1px solid var(--border); color: var(--muted);
    padding: 6px 12px; font-family: 'JetBrains Mono', monospace; font-size: 10px;
    text-transform: uppercase; letter-spacing: 0.1em; cursor: pointer;
    margin-top: 16px; transition: all 0.2s;
  }
  .clear-btn:hover { color: var(--accent); border-color: var(--accent); }

  .back-link {
    background: none; border: none; font-family: 'JetBrains Mono', monospace;
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.15em;
    color: var(--muted); cursor: pointer; padding: 0; margin-bottom: 24px;
  }
  .back-link:hover { color: var(--accent); }
  .options-title { font-size: 42px; font-weight: 600; letter-spacing: -0.02em; margin-bottom: 8px; }
  .options-sub { color: var(--muted); margin-bottom: 36px; font-family: 'JetBrains Mono', monospace; font-size: 13px; }
  .option-group { margin-bottom: 28px; }
  .option-label {
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    text-transform: uppercase; letter-spacing: 0.15em; color: var(--muted);
    margin-bottom: 12px; display: block;
  }
  .pill-row { display: flex; flex-wrap: wrap; gap: 8px; }
  .pill {
    background: var(--paper); border: 1px solid var(--border); padding: 10px 18px;
    cursor: pointer; font-family: inherit; font-size: 15px; color: var(--ink); transition: all 0.2s;
  }
  .pill:hover { border-color: var(--ink); }
  .pill.selected { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .checkbox-row { display: flex; align-items: center; gap: 10px; margin-top: 10px; cursor: pointer; font-size: 15px; }
  .checkbox-row input { accent-color: var(--accent); width: 16px; height: 16px; }
  .start-btn {
    background: var(--ink); color: var(--paper); border: none; padding: 16px 32px;
    font-family: 'JetBrains Mono', monospace; font-size: 13px;
    text-transform: uppercase; letter-spacing: 0.2em; cursor: pointer;
    margin-top: 12px; transition: all 0.2s;
  }
  .start-btn:hover { background: var(--accent); }

  .practice-header {
    display: flex; justify-content: space-between; align-items: center;
    padding-bottom: 16px; border-bottom: 1px solid var(--border); margin-bottom: 40px;
  }
  .practice-meta { font-family: 'JetBrains Mono', monospace; font-size: 12px;
    color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; }
  .practice-meta span { color: var(--ink); }
  .timer { font-family: 'JetBrains Mono', monospace; font-size: 22px;
    font-weight: 600; color: var(--accent); font-variant-numeric: tabular-nums; }
  .progress-bar { height: 3px; background: var(--border); margin-bottom: 48px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); transition: width 0.3s ease; }

  .problem-area { text-align: center; padding: 24px 0 48px; }
  .problem-prompt {
    font-size: 18px; color: var(--ink); margin-bottom: 16px;
    font-weight: 500; font-style: italic;
  }
  .problem-prompt.big {
    font-size: 32px; color: var(--ink); margin-bottom: 14px;
    font-weight: 500; font-style: normal; letter-spacing: -0.01em; line-height: 1.25;
  }
  .problem-text { font-size: 46px; font-weight: 500; letter-spacing: -0.01em;
    margin-bottom: 36px; line-height: 1.2; }
  .answer-input {
    background: var(--paper); border: none; border-bottom: 2px solid var(--ink);
    padding: 12px 16px; font-family: 'JetBrains Mono', monospace; font-size: 24px;
    text-align: center; width: 100%; max-width: 380px; outline: none;
    color: var(--ink); font-weight: 500;
  }
  .answer-input:focus { border-color: var(--accent); }
  .answer-input:disabled { opacity: 0.5; }

  .feedback { margin-top: 24px; min-height: 56px; font-family: 'JetBrains Mono', monospace;
    font-size: 14px; text-transform: uppercase; letter-spacing: 0.1em; }
  .feedback.correct { color: var(--accent-2); }
  .feedback.incorrect {
    text-transform: none; letter-spacing: 0.02em;
    background: rgba(200, 85, 61, 0.08);
    border: 1px solid var(--accent);
    padding: 20px 24px;
    margin: 24px auto 0;
    max-width: 480px;
  }
  .feedback.incorrect .ans-label {
    text-transform: uppercase; letter-spacing: 0.18em;
    font-size: 11px; display: block; margin-bottom: 10px; color: var(--accent);
    font-weight: 600;
  }
  .feedback.incorrect .ans-val {
    font-size: 38px; color: var(--ink); font-weight: 600;
    font-family: 'Fraunces', serif; letter-spacing: -0.01em;
    display: block; line-height: 1.1;
  }

  .continue-btn {
    background: var(--accent); color: var(--paper); border: none; padding: 12px 28px;
    font-family: 'JetBrains Mono', monospace; font-size: 12px;
    text-transform: uppercase; letter-spacing: 0.18em; cursor: pointer;
    margin-top: 18px; transition: all 0.2s;
  }
  .continue-btn:hover { background: var(--ink); }
  .skip-btn {
    background: none; border: 1px solid var(--border); color: var(--muted);
    padding: 8px 16px; font-family: 'JetBrains Mono', monospace; font-size: 11px;
    text-transform: uppercase; letter-spacing: 0.15em; cursor: pointer;
    margin-top: 24px; transition: all 0.2s;
  }
  .skip-btn:hover { color: var(--ink); border-color: var(--ink); }

  .results-title { font-size: 56px; font-weight: 600; font-style: italic;
    letter-spacing: -0.03em; margin-bottom: 8px; }
  .results-sub { color: var(--muted); font-family: 'JetBrains Mono', monospace;
    font-size: 13px; text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 40px; }
  .results-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 24px; margin-bottom: 40px; padding: 28px;
    background: var(--paper); border: 1px solid var(--border);
  }
  .result-item { border-left: 2px solid var(--gold); padding-left: 16px; }
  .result-item:nth-child(2) { border-color: var(--accent); }
  .result-item:nth-child(3) { border-color: var(--accent-2); }
  .result-item:nth-child(4) { border-color: var(--ink); }
  .result-label { font-family: 'JetBrains Mono', monospace; font-size: 10px;
    text-transform: uppercase; letter-spacing: 0.15em; color: var(--muted); }
  .result-val { font-size: 36px; font-weight: 500; margin-top: 6px; letter-spacing: -0.02em; }
  .result-val span { font-size: 16px; color: var(--muted); }
  .action-row { display: flex; gap: 12px; flex-wrap: wrap; }

  @media (max-width: 600px) {
    .intro h1 { font-size: 38px; }
    .problem-text { font-size: 32px; }
    .results-title { font-size: 40px; }
    .options-title { font-size: 32px; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo">TMUA <span>·</span> <em>Speed Trainer</em></div>
    <div class="tag">v0.2 — prototype</div>
  </header>

  <!-- MENU -->
  <div class="screen active" id="screen-menu">
    <div class="intro">
      <h1>Drill the <em>fundamentals</em>.<br>Build pure speed.</h1>
      <p>Pick a category, pick a difficulty, and run repetitions until the patterns become instinct.</p>
    </div>
    <div class="section-label">Categories</div>
    <div class="categories" id="category-grid"></div>
    <div class="progress-section">
      <h2>Recent Sessions</h2>
      <div id="progress-content"></div>
    </div>
  </div>

  <!-- OPTIONS -->
  <div class="screen" id="screen-options">
    <button class="back-link" onclick="showScreen('menu')">← Back</button>
    <h2 class="options-title" id="opt-title"></h2>
    <p class="options-sub" id="opt-sub"></p>

    <div class="option-group">
      <label class="option-label">Difficulty</label>
      <div class="pill-row" id="difficulty-pills">
        <button class="pill" data-value="easy">Easy</button>
        <button class="pill selected" data-value="medium">Medium</button>
        <button class="pill" data-value="hard">Hard</button>
      </div>
    </div>

    <div class="option-group">
      <label class="option-label">Number of Problems</label>
      <div class="pill-row" id="count-pills">
        <button class="pill" data-value="10">10</button>
        <button class="pill selected" data-value="25">25</button>
        <button class="pill" data-value="50">50</button>
      </div>
    </div>

    <div class="option-group" id="quadratic-options" style="display:none;">
      <label class="option-label">Quadratic Types</label>
      <label class="checkbox-row"><input type="checkbox" id="include-standard" checked> Standard form (ax² + bx + c)</label>
      <label class="checkbox-row"><input type="checkbox" id="include-special" checked> Special cases (difference of squares, perfect squares)</label>
    </div>

    <div class="option-group" id="arithmetic-options" style="display:none;">
      <label class="option-label">Operations</label>
      <label class="checkbox-row"><input type="checkbox" id="op-mult" checked> Multiplication (times tables)</label>
      <label class="checkbox-row"><input type="checkbox" id="op-add" checked> Addition</label>
      <label class="checkbox-row"><input type="checkbox" id="op-sub" checked> Subtraction</label>
      <label class="checkbox-row"><input type="checkbox" id="op-div" checked> Division</label>
    </div>

    <button class="start-btn" onclick="startPractice()">Begin Session →</button>
  </div>

  <!-- PRACTICE -->
  <div class="screen" id="screen-practice">
    <div class="practice-header">
      <div class="practice-meta"><span id="practice-category"></span> · <span id="practice-difficulty"></span></div>
      <div class="practice-meta">Problem <span id="problem-counter"></span></div>
      <div class="timer" id="timer-display">00:00</div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>

    <div class="problem-area">
      <div class="problem-prompt" id="problem-prompt"></div>
      <div class="problem-text" id="problem-text"></div>
      <input type="text" class="answer-input" id="answer-input" autocomplete="off" placeholder="answer">
      <div class="feedback" id="feedback"></div>
      <button class="continue-btn" id="continue-btn" style="display:none;" onclick="advance()">Continue →</button>
      <div><button class="skip-btn" id="skip-btn" onclick="skipProblem()">Skip / Show answer</button></div>
    </div>
  </div>

  <!-- RESULTS -->
  <div class="screen" id="screen-results">
    <h2 class="results-title">Session complete</h2>
    <p class="results-sub" id="results-sub"></p>
    <div class="results-grid">
      <div class="result-item">
        <div class="result-label">Correct</div>
        <div class="result-val"><span id="r-correct"></span>/<span id="r-total" style="font-size:36px;color:var(--ink)"></span></div>
      </div>
      <div class="result-item">
        <div class="result-label">Accuracy</div>
        <div class="result-val"><span id="r-acc"></span><span>%</span></div>
      </div>
      <div class="result-item">
        <div class="result-label">Total Time</div>
        <div class="result-val" id="r-time"></div>
      </div>
      <div class="result-item">
        <div class="result-label">Avg / Problem</div>
        <div class="result-val" id="r-avg"></div>
      </div>
    </div>
    <div class="action-row">
      <button class="start-btn" onclick="repeatSession()">Run again →</button>
      <button class="start-btn" style="background:var(--paper);color:var(--ink);border:1px solid var(--border);" onclick="showScreen('menu')">Back to menu</button>
    </div>
  </div>
</div>

<script>
/* ============================================================
   TMUA SPEED TRAINER v0.2
   Fixes: wrong-answer continue button, geometry layout,
   better difficulty separation, no trivial common-factor quadratics,
   leading coefficient on hard quadratics, mental arithmetic category.
   ============================================================ */

const rand = (lo, hi) => Math.floor(Math.random() * (hi - lo + 1)) + lo;
const randNonZero = (lo, hi) => { let x = 0; while (x === 0) x = rand(lo, hi); return x; };
const abs = n => Math.abs(n);
const choose = arr => arr[Math.floor(Math.random() * arr.length)];
const gcd = (a, b) => { a = abs(a); b = abs(b); while (b) { [a, b] = [b, a % b]; } return a || 1; };

function normalize(s) {
  return s.toLowerCase()
    .replace(/\s+/g, '').replace(/\*\*/g, '^').replace(/·|\*/g, '')
    .replace(/−/g, '-').replace(/×/g, '').replace(/[{}]/g, '');
}
function expandAndCompare(userAns, correctAns) {
  const a = canonicalPoly(userAns); const b = canonicalPoly(correctAns);
  if (a && b) return a === b;
  return normalize(userAns) === normalize(correctAns);
}
function canonicalPoly(str) {
  try {
    const tokens = tokenize(normalize(str));
    const poly = parseExpr(tokens);
    if (tokens.length) return null;
    return polyToString(poly);
  } catch (e) { return null; }
}
function tokenize(s) {
  const out = []; let i = 0;
  while (i < s.length) {
    const c = s[i];
    if ('+-*/^()'.includes(c)) { out.push(c); i++; continue; }
    if (c === 'x') { out.push('x'); i++; continue; }
    if (/[0-9]/.test(c)) {
      let j = i; while (j < s.length && /[0-9]/.test(s[j])) j++;
      out.push({ num: parseInt(s.slice(i, j), 10) }); i = j; continue;
    }
    throw new Error('bad char ' + c);
  }
  const fixed = [];
  for (let k = 0; k < out.length; k++) {
    const cur = out[k]; const prev = fixed[fixed.length - 1];
    if (prev !== undefined) {
      const prevEnd = (typeof prev === 'object') || prev === 'x' || prev === ')';
      const curStart = (typeof cur === 'object') || cur === 'x' || cur === '(';
      if (prevEnd && curStart) fixed.push('*');
    }
    fixed.push(cur);
  }
  return fixed;
}
function parseExpr(tokens) {
  let left = parseTerm(tokens);
  while (tokens[0] === '+' || tokens[0] === '-') {
    const op = tokens.shift(); const right = parseTerm(tokens);
    left = op === '+' ? polyAdd(left, right) : polyAdd(left, polyScale(right, -1));
  }
  return left;
}
function parseTerm(tokens) {
  let left = parseFactor(tokens);
  while (tokens[0] === '*' || tokens[0] === '/') {
    const op = tokens.shift(); const right = parseFactor(tokens);
    if (op === '*') left = polyMul(left, right);
    else { if (right.length !== 1) throw new Error('non-const divisor'); left = left.map(v => v / right[0]); }
  }
  return left;
}
function parseFactor(tokens) {
  let neg = false;
  while (tokens[0] === '+' || tokens[0] === '-') if (tokens.shift() === '-') neg = !neg;
  let base = parsePower(tokens);
  if (neg) base = polyScale(base, -1);
  return base;
}
function parsePower(tokens) {
  let base = parsePrimary(tokens);
  if (tokens[0] === '^') {
    tokens.shift(); const exp = tokens.shift();
    if (typeof exp !== 'object') throw new Error('bad exp');
    let result = [1];
    for (let i = 0; i < exp.num; i++) result = polyMul(result, base);
    base = result;
  }
  return base;
}
function parsePrimary(tokens) {
  const t = tokens.shift();
  if (t === '(') { const e = parseExpr(tokens); if (tokens.shift() !== ')') throw new Error('missing )'); return e; }
  if (typeof t === 'object') return [t.num];
  if (t === 'x') return [0, 1];
  throw new Error('bad token ' + t);
}
function polyAdd(a, b) {
  const out = []; const n = Math.max(a.length, b.length);
  for (let i = 0; i < n; i++) out.push((a[i] || 0) + (b[i] || 0));
  while (out.length > 1 && out[out.length - 1] === 0) out.pop();
  return out;
}
function polyScale(a, s) { return a.map(v => v * s); }
function polyMul(a, b) {
  const out = new Array(a.length + b.length - 1).fill(0);
  for (let i = 0; i < a.length; i++) for (let j = 0; j < b.length; j++) out[i + j] += a[i] * b[j];
  while (out.length > 1 && out[out.length - 1] === 0) out.pop();
  return out;
}
function polyToString(p) {
  const parts = [];
  for (let i = p.length - 1; i >= 0; i--) { if (p[i] === 0) continue; parts.push(`${p[i]}x^${i}`); }
  return parts.join('|') || '0';
}

// ============== CATEGORIES ==============
const CATEGORIES = {
  arithmetic: { name: 'Mental Arithmetic', blurb: 'times tables, +, −, ÷', generate: genArithmetic },
  quadratics: { name: 'Factoring Quadratics', blurb: 'standard & special forms', generate: genQuadratic },
  expand:     { name: 'Expanding Brackets', blurb: 'binomials & products', generate: genExpand },
  algebra:    { name: 'Algebraic Manipulation', blurb: 'simplify & collect terms', generate: genAlgebra },
  exponents:  { name: 'Exponent Laws', blurb: 'powers, roots, fractions', generate: genExponents },
  linear:     { name: 'Linear Equations', blurb: 'solve for x', generate: genLinear },
  geometry:   { name: 'Geometry Fundamentals', blurb: 'angles, areas, theorems', generate: genGeometry },
  trig:       { name: 'Trigonometry Basics', blurb: 'exact values & identities', generate: genTrig },
  logs:       { name: 'Logarithm Laws', blurb: 'evaluate & manipulate', generate: genLogs },
  sequences:  { name: 'Sequences & Series', blurb: 'arithmetic & geometric', generate: genSequences }
};

// -------------- ARITHMETIC --------------
function genArithmetic(diff, opts) {
  const ops = [];
  if (opts.mult !== false) ops.push('mult');
  if (opts.add !== false) ops.push('add');
  if (opts.sub !== false) ops.push('sub');
  if (opts.div !== false) ops.push('div');
  if (ops.length === 0) ops.push('mult');
  const op = choose(ops);

  if (op === 'mult') {
    let a, b;
    if (diff === 'easy') { a = rand(2, 9); b = rand(2, 9); }
    else if (diff === 'medium') { a = rand(2, 12); b = rand(2, 12); }
    else { a = rand(6, 15); b = rand(6, 15); }
    return { prompt: 'Calculate', question: `${a} × ${b}`, answer: `${a * b}`, acceptable: [`${a * b}`], type: 'text' };
  }
  if (op === 'add') {
    let a, b;
    if (diff === 'easy') { a = rand(10, 50); b = rand(10, 50); }
    else if (diff === 'medium') { a = rand(20, 200); b = rand(20, 200); }
    else { a = rand(100, 999); b = rand(100, 999); }
    return { prompt: 'Calculate', question: `${a} + ${b}`, answer: `${a + b}`, acceptable: [`${a + b}`], type: 'text' };
  }
  if (op === 'sub') {
    let a, b;
    if (diff === 'easy') { b = rand(5, 30); a = b + rand(5, 40); }
    else if (diff === 'medium') { b = rand(20, 150); a = b + rand(20, 150); }
    else { b = rand(100, 500); a = b + rand(100, 800); }
    return { prompt: 'Calculate', question: `${a} − ${b}`, answer: `${a - b}`, acceptable: [`${a - b}`], type: 'text' };
  }
  // division — clean integer
  let q, b;
  if (diff === 'easy') { q = rand(2, 10); b = rand(2, 9); }
  else if (diff === 'medium') { q = rand(2, 15); b = rand(2, 12); }
  else { q = rand(3, 25); b = rand(4, 15); }
  const a = q * b;
  return { prompt: 'Calculate', question: `${a} ÷ ${b}`, answer: `${q}`, acceptable: [`${q}`], type: 'text' };
}

// -------------- QUADRATICS --------------
function genQuadratic(diff, opts) {
  const useStandard = opts.standard !== false;
  const useSpecial = opts.special !== false;
  const types = [];
  if (useStandard) types.push('standard', 'standard');
  if (useSpecial) types.push('diff_sq', 'perfect_sq');
  if (types.length === 0) types.push('standard');
  const type = choose(types);

  if (type === 'diff_sq') {
    let a;
    if (diff === 'easy') a = rand(2, 6);
    else if (diff === 'medium') a = rand(4, 11);
    else a = rand(7, 15); // hard: avoid trivial like x^2 - 9
    const c = a * a;
    return {
      prompt: 'Factorise', question: `x² − ${c}`,
      answer: `(x-${a})(x+${a})`,
      acceptable: [`(x-${a})(x+${a})`, `(x+${a})(x-${a})`], type: 'poly'
    };
  }
  if (type === 'perfect_sq') {
    let a;
    if (diff === 'easy') a = rand(2, 5);
    else if (diff === 'medium') a = rand(4, 9);
    else a = rand(6, 12);
    const s = choose([1, -1]);
    const b = 2 * s * a; const c = a * a;
    const sgn = b >= 0 ? '+' : '-';
    return {
      prompt: 'Factorise', question: `x² ${sgn} ${abs(b)}x + ${c}`,
      answer: `(x${sgn}${a})^2`,
      acceptable: [`(x${sgn}${a})^2`, `(x${sgn}${a})(x${sgn}${a})`], type: 'poly'
    };
  }

  // STANDARD form. Generate roots, optional leading coefficient. Reject any case
  // where gcd(a, b, c) > 1 (so the user can't just divide a constant out).
  let r1, r2, lead, A, B, C;
  let attempts = 0;
  while (true) {
    attempts++;
    if (diff === 'easy') {
      r1 = randNonZero(-6, 6); r2 = randNonZero(-6, 6); lead = 1;
    } else if (diff === 'medium') {
      r1 = randNonZero(-10, 10); r2 = randNonZero(-10, 10);
      lead = (Math.random() < 0.2) ? choose([2, 3]) : 1;
    } else {
      // HARD: mostly leading coefficient > 1 with small values (2, 3, 4)
      r1 = randNonZero(-9, 9); r2 = randNonZero(-9, 9);
      lead = Math.random() < 0.8 ? choose([2, 2, 3, 3, 4]) : 1;
    }
    A = lead; B = -lead * (r1 + r2); C = lead * r1 * r2;
    const g = gcd(gcd(abs(A), abs(B) || abs(A)), abs(C) || abs(A));
    if (g === 1 && B !== 0 && C !== 0) break;
    if (attempts > 40) { lead = 1; A = 1; B = -(r1 + r2); C = r1 * r2; break; }
  }

  const leadStr = lead === 1 ? '' : lead + '';
  const bSgn = B >= 0 ? '+' : '-';
  const cSgn = C >= 0 ? '+' : '-';

  let factored;
  if (lead === 1) {
    const f1 = `(x${r1 >= 0 ? '-' + r1 : '+' + abs(r1)})`;
    const f2 = `(x${r2 >= 0 ? '-' + r2 : '+' + abs(r2)})`;
    factored = f1 + f2;
  } else {
    // Absorb lead into first factor so it factors as integers
    const f1 = `(${lead}x${r1 >= 0 ? '-' + (lead * r1) : '+' + abs(lead * r1)})`;
    const f2 = `(x${r2 >= 0 ? '-' + r2 : '+' + abs(r2)})`;
    factored = f1 + f2;
  }

  return {
    prompt: 'Factorise',
    question: `${leadStr}x² ${bSgn} ${abs(B)}x ${cSgn} ${abs(C)}`,
    answer: factored, acceptable: [factored], type: 'poly'
  };
}

// -------------- EXPAND --------------
function genExpand(diff) {
  if (diff === 'easy') {
    const a = randNonZero(-6, 6), b = randNonZero(-6, 6);
    const aStr = a >= 0 ? `+${a}` : `${a}`; const bStr = b >= 0 ? `+${b}` : `${b}`;
    const B = a + b, C = a * b;
    return {
      prompt: 'Expand', question: `(x${aStr})(x${bStr})`,
      answer: `x^2${B >= 0 ? '+' : ''}${B}x${C >= 0 ? '+' : ''}${C}`,
      acceptable: [`x^2${B >= 0 ? '+' : ''}${B}x${C >= 0 ? '+' : ''}${C}`], type: 'poly'
    };
  }
  if (diff === 'medium') {
    const a = randNonZero(-10, 10), b = randNonZero(-10, 10);
    const aStr = a >= 0 ? `+${a}` : `${a}`; const bStr = b >= 0 ? `+${b}` : `${b}`;
    const B = a + b, C = a * b;
    return {
      prompt: 'Expand', question: `(x${aStr})(x${bStr})`,
      answer: `x^2${B >= 0 ? '+' : ''}${B}x${C >= 0 ? '+' : ''}${C}`,
      acceptable: [`x^2${B >= 0 ? '+' : ''}${B}x${C >= 0 ? '+' : ''}${C}`], type: 'poly'
    };
  }
  const p = choose([2, 3, 4]), q = choose([2, 3]);
  const a = randNonZero(-8, 8), b = randNonZero(-8, 8);
  const aStr = a >= 0 ? `+${a}` : `${a}`; const bStr = b >= 0 ? `+${b}` : `${b}`;
  const A = p * q, B = p * b + q * a, C = a * b;
  return {
    prompt: 'Expand', question: `(${p}x${aStr})(${q}x${bStr})`,
    answer: `${A}x^2${B >= 0 ? '+' : ''}${B}x${C >= 0 ? '+' : ''}${C}`,
    acceptable: [`${A}x^2${B >= 0 ? '+' : ''}${B}x${C >= 0 ? '+' : ''}${C}`], type: 'poly'
  };
}

// -------------- ALGEBRA --------------
function genAlgebra(diff) {
  const types = diff === 'easy'
    ? ['collect', 'distribute']
    : diff === 'medium'
      ? ['collect', 'distribute', 'fraction']
      : ['distribute_complex', 'fraction', 'fraction_alg'];
  const t = choose(types);

  if (t === 'collect') {
    const range = diff === 'easy' ? 6 : 10;
    const a = randNonZero(-range, range), b = randNonZero(-range, range);
    const c = randNonZero(-range, range), d = randNonZero(-range, range);
    const x = a + c, y = b + d;
    const bSgn = b >= 0 ? '+' : '-', cSgn = c >= 0 ? '+' : '-', dSgn = d >= 0 ? '+' : '-';
    const ans = `${x}x${y >= 0 ? '+' : ''}${y}`;
    return {
      prompt: 'Simplify',
      question: `${a}x ${bSgn} ${abs(b)} ${cSgn} ${abs(c)}x ${dSgn} ${abs(d)}`,
      answer: ans, acceptable: [ans], type: 'poly'
    };
  }
  if (t === 'distribute') {
    const k = randNonZero(-6, 6), a = randNonZero(-8, 8), b = randNonZero(-8, 8);
    const A = k * a, B = k * b;
    return {
      prompt: 'Expand & simplify',
      question: `${k}(${a}x ${b >= 0 ? '+' : '-'} ${abs(b)})`,
      answer: `${A}x${B >= 0 ? '+' : ''}${B}`,
      acceptable: [`${A}x${B >= 0 ? '+' : ''}${B}`], type: 'poly'
    };
  }
  if (t === 'distribute_complex') {
    const a = randNonZero(-5, 5), b = randNonZero(-5, 5), c = randNonZero(-8, 8);
    const d = randNonZero(-5, 5), e = randNonZero(-5, 5), f = randNonZero(-8, 8);
    const A = a * b + d * e, B = a * c + d * f;
    if (A === 0) return genAlgebra('hard');
    return {
      prompt: 'Expand & simplify',
      question: `${a}(${b}x ${c >= 0 ? '+' : '-'} ${abs(c)}) + ${d}(${e}x ${f >= 0 ? '+' : '-'} ${abs(f)})`,
      answer: `${A}x${B >= 0 ? '+' : ''}${B}`,
      acceptable: [`${A}x${B >= 0 ? '+' : ''}${B}`], type: 'poly'
    };
  }
  if (t === 'fraction') {
    const a = rand(1, 9), b = rand(2, 9), c = rand(1, 9), d = rand(2, 9);
    const num = a * d + c * b, den = b * d, g = gcd(num, den);
    const sn = num / g, sd = den / g;
    const ans = sd === 1 ? `${sn}` : `${sn}/${sd}`;
    return {
      prompt: 'Simplify', question: `${a}/${b} + ${c}/${d}`,
      answer: ans, acceptable: [ans, `${num}/${den}`], type: 'text'
    };
  }
  const a = rand(1, 7), b = rand(2, 7), c = rand(1, 7), d = rand(2, 7);
  const num = a * d + c * b, den = b * d, g = gcd(num, den);
  const sn = num / g, sd = den / g;
  const ans = sd === 1 ? `${sn}x` : `(${sn}/${sd})x`;
  return {
    prompt: 'Simplify', question: `(${a}/${b})x + (${c}/${d})x`,
    answer: ans, acceptable: [ans, `${sn}x/${sd}`, `${num}x/${den}`], type: 'text'
  };
}

// -------------- EXPONENTS --------------
function genExponents(diff) {
  const easy_types = ['mult', 'div', 'power'];
  const med_types = ['mult', 'div', 'power', 'neg'];
  const hard_types = ['mult_neg', 'div_neg', 'frac', 'frac_power'];
  const types = diff === 'easy' ? easy_types : diff === 'medium' ? med_types : hard_types;
  const t = choose(types);

  if (t === 'mult') {
    const a = rand(2, 5), m = rand(2, 6), n = rand(2, 6);
    return {
      prompt: 'Simplify (as aᵏ)', question: `${a}^${m} · ${a}^${n}`,
      answer: `${a}^${m + n}`, acceptable: [`${a}^${m + n}`, `${a}^(${m + n})`], type: 'text'
    };
  }
  if (t === 'div') {
    const a = rand(2, 5), m = rand(5, 10), n = rand(1, 4);
    return {
      prompt: 'Simplify (as aᵏ)', question: `${a}^${m} ÷ ${a}^${n}`,
      answer: `${a}^${m - n}`, acceptable: [`${a}^${m - n}`], type: 'text'
    };
  }
  if (t === 'power') {
    const a = rand(2, 5), m = rand(2, 5), n = rand(2, 4);
    return {
      prompt: 'Simplify (as aᵏ)', question: `(${a}^${m})^${n}`,
      answer: `${a}^${m * n}`, acceptable: [`${a}^${m * n}`], type: 'text'
    };
  }
  if (t === 'mult_neg') {
    const a = rand(2, 5), m = rand(3, 6), n = rand(2, 6);
    return {
      prompt: 'Simplify (as aᵏ)', question: `${a}^${m} · ${a}^(−${n})`,
      answer: `${a}^${m - n}`, acceptable: [`${a}^${m - n}`], type: 'text'
    };
  }
  if (t === 'div_neg') {
    const a = rand(2, 5), m = rand(2, 5), n = rand(2, 6);
    return {
      prompt: 'Simplify (as aᵏ)', question: `${a}^${m} ÷ ${a}^(−${n})`,
      answer: `${a}^${m + n}`, acceptable: [`${a}^${m + n}`], type: 'text'
    };
  }
  if (t === 'neg') {
    const a = rand(2, 5), n = rand(1, 3);
    const v = Math.pow(a, n);
    return {
      prompt: 'Evaluate as a fraction', question: `${a}^(−${n})`,
      answer: `1/${v}`, acceptable: [`1/${v}`], type: 'text'
    };
  }
  if (t === 'frac') {
    const bases = [[8, 3], [27, 3], [16, 4], [32, 5], [64, 3], [125, 3]];
    const [base, root] = choose(bases);
    const val = Math.round(Math.pow(base, 1 / root));
    return {
      prompt: 'Evaluate', question: `${base}^(1/${root})`,
      answer: `${val}`, acceptable: [`${val}`], type: 'text'
    };
  }
  const bases = [[8, 3], [27, 3], [16, 4], [16, 2], [25, 2], [64, 3]];
  const [base, root] = choose(bases);
  const m = rand(2, 3);
  const val = Math.pow(Math.round(Math.pow(base, 1 / root)), m);
  return {
    prompt: 'Evaluate', question: `${base}^(${m}/${root})`,
    answer: `${val}`, acceptable: [`${val}`], type: 'text'
  };
}

// -------------- LINEAR --------------
function genLinear(diff) {
  if (diff === 'easy') {
    const a = randNonZero(-6, 6), x = rand(-6, 6), b = randNonZero(-9, 9);
    const c = a * x + b;
    return {
      prompt: 'Solve for x',
      question: `${a}x ${b >= 0 ? '+' : '-'} ${abs(b)} = ${c}`,
      answer: `${x}`, acceptable: [`${x}`], type: 'text'
    };
  }
  if (diff === 'medium') {
    const x = rand(-8, 8);
    const a = randNonZero(-7, 7); let c; do { c = randNonZero(-7, 7); } while (c === a);
    const b = randNonZero(-12, 12);
    const d = a * x + b - c * x;
    return {
      prompt: 'Solve for x',
      question: `${a}x ${b >= 0 ? '+' : '-'} ${abs(b)} = ${c}x ${d >= 0 ? '+' : '-'} ${abs(d)}`,
      answer: `${x}`, acceptable: [`${x}`], type: 'text'
    };
  }
  // HARD: brackets or fractional answer
  if (Math.random() < 0.55) {
    // brackets
    const x = rand(-6, 6);
    const a = randNonZero(-5, 5), b = randNonZero(-4, 4);
    let d, e;
    do { d = randNonZero(-5, 5); e = randNonZero(-4, 4); } while (a * b === d * e);
    const c = randNonZero(-8, 8);
    const f = (x * (a * b - d * e) + a * c) / d;
    if (!Number.isInteger(f) || abs(f) > 20) return genLinear('hard');
    return {
      prompt: 'Solve for x',
      question: `${a}(${b}x ${c >= 0 ? '+' : '-'} ${abs(c)}) = ${d}(${e}x ${f >= 0 ? '+' : '-'} ${abs(f)})`,
      answer: `${x}`, acceptable: [`${x}`], type: 'text'
    };
  }
  const a = randNonZero(-9, 9); let c; do { c = randNonZero(-9, 9); } while (c === a);
  const b = randNonZero(-12, 12), d = randNonZero(-12, 12);
  let num = d - b, den = a - c;
  if (den < 0) { num = -num; den = -den; }
  const g = gcd(num, den);
  const sn = num / g, sd = den / g;
  if (sd === 1) return genLinear('hard'); // ensure it's actually fractional
  const ans = `${sn}/${sd}`;
  return {
    prompt: 'Solve for x (give as fraction if needed)',
    question: `${a}x ${b >= 0 ? '+' : '-'} ${abs(b)} = ${c}x ${d >= 0 ? '+' : '-'} ${abs(d)}`,
    answer: ans, acceptable: [ans], type: 'text'
  };
}

// -------------- GEOMETRY (restructured) --------------
function genGeometry(diff) {
  const easy = ['triangle_angle', 'rect_area', 'pythag_simple', 'triangle_area'];
  const med = ['triangle_angle', 'rect_area', 'circle_area', 'circle_circ', 'pythag', 'triangle_area', 'parallel_angle'];
  const hard = ['circle_area', 'circle_circ', 'pythag_find_leg', 'triangle_area', 'parallel_angle', 'sector', 'angle_polygon'];
  const types = diff === 'easy' ? easy : diff === 'medium' ? med : hard;
  const t = choose(types);

  if (t === 'triangle_angle') {
    const a = rand(20, 80), b = rand(20, 80);
    return {
      prompt: `Triangle has angles ${a}° and ${b}°`,
      question: `Find the third angle`,
      answer: `${180 - a - b}`, acceptable: [`${180 - a - b}`, `${180 - a - b}°`], type: 'text'
    };
  }
  if (t === 'rect_area') {
    const w = rand(3, 15), h = rand(3, 15);
    return {
      prompt: `Rectangle with width ${w} and height ${h}`,
      question: `Find the area`,
      answer: `${w * h}`, acceptable: [`${w * h}`], type: 'text'
    };
  }
  if (t === 'triangle_area') {
    const base = rand(3, 15), height = choose([4, 6, 8, 10, 12]);
    return {
      prompt: `Triangle with base ${base} and height ${height}`,
      question: `Find the area`,
      answer: `${base * height / 2}`, acceptable: [`${base * height / 2}`], type: 'text'
    };
  }
  if (t === 'circle_area') {
    const r = rand(2, 12);
    return {
      prompt: `Circle with radius ${r}`,
      question: `Find the area (in terms of π)`,
      answer: `${r * r}π`,
      acceptable: [`${r * r}pi`, `${r * r}π`, `${r * r}*pi`], type: 'text'
    };
  }
  if (t === 'circle_circ') {
    const r = rand(2, 15);
    return {
      prompt: `Circle with radius ${r}`,
      question: `Find the circumference (in terms of π)`,
      answer: `${2 * r}π`, acceptable: [`${2 * r}pi`, `${2 * r}π`], type: 'text'
    };
  }
  if (t === 'pythag_simple') {
    const triples = [[3, 4, 5], [6, 8, 10], [5, 12, 13]];
    const [a, b, c] = choose(triples);
    return {
      prompt: `Right triangle with legs ${a} and ${b}`,
      question: `Find the hypotenuse`,
      answer: `${c}`, acceptable: [`${c}`], type: 'text'
    };
  }
  if (t === 'pythag') {
    const triples = [[3, 4, 5], [5, 12, 13], [6, 8, 10], [8, 15, 17], [7, 24, 25], [9, 12, 15], [9, 40, 41]];
    const [a, b, c] = choose(triples);
    return {
      prompt: `Right triangle with legs ${a} and ${b}`,
      question: `Find the hypotenuse`,
      answer: `${c}`, acceptable: [`${c}`], type: 'text'
    };
  }
  if (t === 'pythag_find_leg') {
    const triples = [[3, 4, 5], [5, 12, 13], [8, 15, 17], [7, 24, 25], [9, 40, 41], [20, 21, 29]];
    const [a, b, c] = choose(triples);
    const showB = Math.random() < 0.5;
    return {
      prompt: `Right triangle, hypotenuse ${c}, one leg ${showB ? b : a}`,
      question: `Find the other leg`,
      answer: `${showB ? a : b}`, acceptable: [`${showB ? a : b}`], type: 'text'
    };
  }
  if (t === 'parallel_angle') {
    const a = rand(30, 150);
    const choice = choose(['alt', 'cointerior']);
    if (choice === 'alt') {
      return {
        prompt: `Parallel lines cut by a transversal. One angle is ${a}°`,
        question: `Find the alternate angle`,
        answer: `${a}`, acceptable: [`${a}`, `${a}°`], type: 'text'
      };
    }
    return {
      prompt: `Parallel lines cut by a transversal. One co-interior angle is ${a}°`,
      question: `Find the other co-interior angle`,
      answer: `${180 - a}`, acceptable: [`${180 - a}`, `${180 - a}°`], type: 'text'
    };
  }
  if (t === 'angle_polygon') {
    // interior angle of regular polygon
    const n = choose([5, 6, 8, 9, 10, 12]);
    const ang = (n - 2) * 180 / n;
    return {
      prompt: `Regular polygon with ${n} sides`,
      question: `Find each interior angle`,
      answer: `${ang}`, acceptable: [`${ang}`, `${ang}°`], type: 'text'
    };
  }
  // sector
  const r = choose([3, 4, 6, 10, 12]);
  const theta = choose([30, 45, 60, 90, 120, 180]);
  const num = theta * r * r;
  const den = 360;
  const g = gcd(num, den);
  const sn = num / g, sd = den / g;
  const ansStr = sd === 1 ? `${sn}π` : `(${sn}/${sd})π`;
  return {
    prompt: `Sector of a circle, radius ${r}, angle ${theta}°`,
    question: `Find the area (in terms of π)`,
    answer: ansStr,
    acceptable: [ansStr, ansStr.replace('π', 'pi')], type: 'text'
  };
}

// -------------- TRIG --------------
function genTrig(diff) {
  const exact = {
    'sin(0)': '0', 'sin(30)': '1/2', 'sin(45)': 'sqrt(2)/2', 'sin(60)': 'sqrt(3)/2', 'sin(90)': '1',
    'cos(0)': '1', 'cos(30)': 'sqrt(3)/2', 'cos(45)': 'sqrt(2)/2', 'cos(60)': '1/2', 'cos(90)': '0',
    'tan(0)': '0', 'tan(30)': 'sqrt(3)/3', 'tan(45)': '1', 'tan(60)': 'sqrt(3)'
  };
  const easy_keys = ['sin(0)', 'sin(30)', 'sin(60)', 'sin(90)', 'cos(0)', 'cos(60)', 'cos(90)', 'tan(0)', 'tan(45)'];
  const med_keys = Object.keys(exact);
  const hard_keys = ['sin(45)', 'cos(45)', 'sin(30)', 'cos(30)', 'sin(60)', 'cos(60)', 'tan(30)', 'tan(60)'];
  const keys = diff === 'easy' ? easy_keys : diff === 'medium' ? med_keys : hard_keys;
  const k = choose(keys);
  const accepts = [exact[k]];
  if (exact[k] === 'sqrt(2)/2') accepts.push('1/sqrt(2)', '√2/2');
  if (exact[k] === 'sqrt(3)/3') accepts.push('1/sqrt(3)', '√3/3');
  if (exact[k] === 'sqrt(3)/2') accepts.push('√3/2');
  if (exact[k] === 'sqrt(3)') accepts.push('√3');
  return {
    prompt: 'Exact value', question: k + '°',
    answer: exact[k], acceptable: accepts, type: 'text'
  };
}

// -------------- LOGS --------------
function genLogs(diff) {
  if (diff === 'easy') {
    const b = choose([2, 3, 5, 10]); const n = rand(1, 4);
    const val = Math.pow(b, n);
    return {
      prompt: 'Evaluate', question: `log_${b}(${val})`,
      answer: `${n}`, acceptable: [`${n}`], type: 'text'
    };
  }
  if (diff === 'medium') {
    const t = choose(['eval', 'sum', 'diff']);
    if (t === 'eval') {
      const b = choose([2, 3, 5, 10]); const n = rand(2, 6);
      const val = Math.pow(b, n);
      return { prompt: 'Evaluate', question: `log_${b}(${val})`, answer: `${n}`, acceptable: [`${n}`], type: 'text' };
    }
    if (t === 'sum') {
      const b = choose([2, 3, 5]); const m = rand(1, 4), n = rand(1, 4);
      const x = Math.pow(b, m), y = Math.pow(b, n);
      return { prompt: 'Evaluate', question: `log_${b}(${x}) + log_${b}(${y})`, answer: `${m + n}`, acceptable: [`${m + n}`], type: 'text' };
    }
    const b = choose([2, 3, 5]); const m = rand(3, 6), n = rand(1, 3);
    const x = Math.pow(b, m), y = Math.pow(b, n);
    return { prompt: 'Evaluate', question: `log_${b}(${x}) − log_${b}(${y})`, answer: `${m - n}`, acceptable: [`${m - n}`], type: 'text' };
  }
  // HARD — no trivial cases. All require applying multiple log laws.
  const t = choose(['power_law', 'combined', 'log_of_power', 'mixed_eval']);
  if (t === 'power_law') {
    // n · log_b(b^m), with m >= 2
    const b = choose([2, 3, 5, 10]); const m = rand(2, 4), n = rand(2, 5);
    const val = Math.pow(b, m);
    return { prompt: 'Evaluate', question: `${n} · log_${b}(${val})`, answer: `${n * m}`, acceptable: [`${n * m}`], type: 'text' };
  }
  if (t === 'combined') {
    const b = choose([2, 3, 5]); const m = rand(2, 4), n = rand(2, 4), k2 = rand(1, 3);
    const x = Math.pow(b, m), y = Math.pow(b, n), z = Math.pow(b, k2);
    return { prompt: 'Evaluate', question: `log_${b}(${x}) + log_${b}(${y}) − log_${b}(${z})`, answer: `${m + n - k2}`, acceptable: [`${m + n - k2}`], type: 'text' };
  }
  if (t === 'log_of_power') {
    const b = choose([2, 3, 5]); const m = rand(2, 4), k2 = rand(2, 5);
    const a = Math.pow(b, m);
    return { prompt: 'Evaluate', question: `log_${b}(${a}^${k2})`, answer: `${m * k2}`, acceptable: [`${m * k2}`], type: 'text' };
  }
  const b = choose([2, 3, 5]); const m = rand(2, 4), n = rand(2, 4), c = rand(2, 4);
  const x = Math.pow(b, m), y = Math.pow(b, n);
  return { prompt: 'Evaluate', question: `${c} · log_${b}(${x}) + log_${b}(${y})`, answer: `${c * m + n}`, acceptable: [`${c * m + n}`], type: 'text' };
}

// -------------- SEQUENCES --------------
function genSequences(diff) {
  const easy_types = ['arith_term'];
  const med_types = ['arith_term', 'arith_sum', 'geom_term'];
  const hard_types = ['arith_sum', 'geom_term', 'geom_sum'];
  const types = diff === 'easy' ? easy_types : diff === 'medium' ? med_types : hard_types;
  const t = choose(types);

  if (t === 'arith_term') {
    const a = rand(-10, 10), d = randNonZero(-5, 5);
    const n = diff === 'easy' ? rand(4, 10) : rand(8, 25);
    return {
      prompt: `Arithmetic sequence: a₁ = ${a}, d = ${d}`,
      question: `Find the ${ordinal(n)} term`,
      answer: `${a + d * (n - 1)}`, acceptable: [`${a + d * (n - 1)}`], type: 'text'
    };
  }
  if (t === 'arith_sum') {
    const a = rand(-5, 10), d = randNonZero(-4, 4);
    const n = diff === 'medium' ? rand(4, 10) : rand(8, 20);
    const s = (n * (2 * a + (n - 1) * d)) / 2;
    return {
      prompt: `Arithmetic sequence: a₁ = ${a}, d = ${d}`,
      question: `Find the sum of the first ${n} terms`,
      answer: `${s}`, acceptable: [`${s}`], type: 'text'
    };
  }
  if (t === 'geom_term') {
    const a = rand(1, 5), r = choose([2, 3, -2, -3]);
    const n = diff === 'medium' ? rand(3, 6) : rand(4, 8);
    const val = a * Math.pow(r, n - 1);
    return {
      prompt: `Geometric sequence: a₁ = ${a}, r = ${r}`,
      question: `Find the ${ordinal(n)} term`,
      answer: `${val}`, acceptable: [`${val}`], type: 'text'
    };
  }
  const a = rand(1, 4), r = choose([2, 3, -2]);
  const n = rand(3, 6);
  const s = a * (Math.pow(r, n) - 1) / (r - 1);
  return {
    prompt: `Geometric sequence: a₁ = ${a}, r = ${r}`,
    question: `Find the sum of the first ${n} terms`,
    answer: `${s}`, acceptable: [`${s}`], type: 'text'
  };
}

function ordinal(n) {
  const s = ['th', 'st', 'nd', 'rd'], v = n % 100;
  return n + (s[(v - 20) % 10] || s[v] || s[0]);
}

// ============== STATE & FLOW ==============
let state = {
  category: null, difficulty: 'medium', count: 25,
  problems: [], index: 0, correct: 0,
  startTime: 0, timerInterval: null,
  opts: {}, awaitingContinue: false,
  pauseStart: 0,     // when the timer was paused (wrong answer / skip)
  pausedTotal: 0,    // total ms paused so far in this session
  readyAt: 0         // earliest time at which 'Continue' can fire (prevents accidental Enter)
};

function renderCategories() {
  const grid = document.getElementById('category-grid');
  grid.innerHTML = '';
  Object.entries(CATEGORIES).forEach(([key, cat], i) => {
    const btn = document.createElement('button');
    btn.className = 'cat-card';
    btn.innerHTML = `
      <div class="cat-num">${String(i + 1).padStart(2, '0')}</div>
      <div class="cat-name">${cat.name}</div>
      <div class="cat-desc">${cat.blurb}</div>
    `;
    btn.onclick = () => openOptions(key);
    grid.appendChild(btn);
  });
}

function openOptions(key) {
  state.category = key;
  const cat = CATEGORIES[key];
  document.getElementById('opt-title').textContent = cat.name;
  document.getElementById('opt-sub').textContent = cat.blurb;
  document.getElementById('quadratic-options').style.display = key === 'quadratics' ? 'block' : 'none';
  document.getElementById('arithmetic-options').style.display = key === 'arithmetic' ? 'block' : 'none';
  showScreen('options');
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
}

document.addEventListener('click', (e) => {
  if (e.target.classList.contains('pill')) {
    const parent = e.target.parentElement;
    parent.querySelectorAll('.pill').forEach(p => p.classList.remove('selected'));
    e.target.classList.add('selected');
  }
});

function startPractice() {
  const diffEl = document.querySelector('#difficulty-pills .pill.selected');
  const countEl = document.querySelector('#count-pills .pill.selected');
  state.difficulty = diffEl ? diffEl.dataset.value : 'medium';
  state.count = countEl ? parseInt(countEl.dataset.value) : 25;
  state.opts = {};
  if (state.category === 'quadratics') {
    state.opts.standard = document.getElementById('include-standard').checked;
    state.opts.special = document.getElementById('include-special').checked;
    if (!state.opts.standard && !state.opts.special) {
      alert('Please select at least one quadratic type.'); return;
    }
  }
  if (state.category === 'arithmetic') {
    state.opts.mult = document.getElementById('op-mult').checked;
    state.opts.add = document.getElementById('op-add').checked;
    state.opts.sub = document.getElementById('op-sub').checked;
    state.opts.div = document.getElementById('op-div').checked;
    if (!state.opts.mult && !state.opts.add && !state.opts.sub && !state.opts.div) {
      alert('Please select at least one operation.'); return;
    }
  }
  state.problems = [];
  for (let i = 0; i < state.count; i++) {
    state.problems.push(CATEGORIES[state.category].generate(state.difficulty, state.opts));
  }
  state.index = 0; state.correct = 0; state.startTime = Date.now();
  state.awaitingContinue = false;
  state.pausedTotal = 0;
  state.pauseStart = 0;
  state.readyAt = 0;
  document.getElementById('practice-category').textContent = CATEGORIES[state.category].name;
  document.getElementById('practice-difficulty').textContent = state.difficulty;
  showScreen('practice');
  showProblem();
  if (state.timerInterval) clearInterval(state.timerInterval);
  state.timerInterval = setInterval(tickTimer, 250);
  document.getElementById('answer-input').focus();
}

function showProblem() {
  const p = state.problems[state.index];
  const promptEl = document.getElementById('problem-prompt');
  promptEl.textContent = p.prompt;
  // For geometry, make BOTH lines prominent
  if (state.category === 'geometry') promptEl.className = 'problem-prompt big';
  else promptEl.className = 'problem-prompt';
  document.getElementById('problem-text').innerHTML = p.question;
  const input = document.getElementById('answer-input');
  input.value = ''; input.disabled = false;
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('continue-btn').style.display = 'none';
  document.getElementById('skip-btn').style.display = 'inline-block';
  document.getElementById('problem-counter').textContent = `${state.index + 1} / ${state.count}`;
  document.getElementById('progress-fill').style.width = ((state.index) / state.count * 100) + '%';
  state.awaitingContinue = false;
  input.focus();
}

function tickTimer() {
  // If currently paused, subtract elapsed pause from the active total
  const now = Date.now();
  const pausedNow = state.pauseStart ? (now - state.pauseStart) : 0;
  const elapsed = (now - state.startTime - state.pausedTotal - pausedNow) / 1000;
  const m = Math.floor(elapsed / 60), s = Math.floor(elapsed % 60);
  const display = document.getElementById('timer-display');
  display.textContent = `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
  display.style.color = state.pauseStart ? 'var(--muted)' : 'var(--accent)';
}

document.getElementById('answer-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    if (state.awaitingContinue) advance();
    else submitAnswer();
  }
});

function submitAnswer() {
  if (state.awaitingContinue) return; // safety: already finished this problem
  const input = document.getElementById('answer-input').value.trim();
  if (!input) return;
  const p = state.problems[state.index];
  let ok = false;
  if (p.type === 'poly') ok = p.acceptable.some(a => expandAndCompare(input, a));
  else ok = p.acceptable.some(a => normalize(input) === normalize(a));

  const fb = document.getElementById('feedback');
  if (ok) {
    state.correct++;
    fb.textContent = '✓ Correct';
    fb.className = 'feedback correct';
    setTimeout(advance, 400);
  } else {
    // PAUSE the timer
    state.pauseStart = Date.now();
    fb.innerHTML = `<span class="ans-label">✗ Incorrect — answer:</span><span class="ans-val">${p.answer}</span>`;
    fb.className = 'feedback incorrect';
    document.getElementById('continue-btn').style.display = 'inline-block';
    document.getElementById('skip-btn').style.display = 'none';
    document.getElementById('answer-input').disabled = true;
    state.awaitingContinue = true;
    // Prevent accidental Enter from dismissing too quickly — require 600ms before continue is responsive
    state.readyAt = Date.now() + 600;
    document.getElementById('continue-btn').focus();
  }
}

function skipProblem() {
  const p = state.problems[state.index];
  state.pauseStart = Date.now();
  const fb = document.getElementById('feedback');
  fb.innerHTML = `<span class="ans-label">Skipped — answer:</span><span class="ans-val">${p.answer}</span>`;
  fb.className = 'feedback incorrect';
  document.getElementById('continue-btn').style.display = 'inline-block';
  document.getElementById('skip-btn').style.display = 'none';
  document.getElementById('answer-input').disabled = true;
  state.awaitingContinue = true;
  state.readyAt = Date.now() + 600;
  document.getElementById('continue-btn').focus();
}

function advance() {
  // Block accidental rapid Enter — don't fire until readyAt has passed
  if (state.awaitingContinue && Date.now() < state.readyAt) return;
  // Resume timer if we were paused
  if (state.pauseStart) {
    state.pausedTotal += Date.now() - state.pauseStart;
    state.pauseStart = 0;
  }
  state.index++;
  if (state.index >= state.count) finishSession();
  else showProblem();
}

function finishSession() {
  clearInterval(state.timerInterval);
  // Active time excludes pauses
  const t = (Date.now() - state.startTime - state.pausedTotal) / 1000;
  const m = Math.floor(t / 60), s = Math.floor(t % 60);
  const avg = t / state.count;
  document.getElementById('r-correct').textContent = state.correct;
  document.getElementById('r-total').textContent = state.count;
  document.getElementById('r-acc').textContent = Math.round((state.correct / state.count) * 100);
  document.getElementById('r-time').textContent = `${m}:${String(s).padStart(2, '0')}`;
  document.getElementById('r-avg').textContent = avg.toFixed(1) + 's';
  document.getElementById('results-sub').textContent = `${CATEGORIES[state.category].name} · ${state.difficulty}`;
  saveSession({
    cat: state.category, diff: state.difficulty, count: state.count,
    correct: state.correct, time: t, avg: avg, date: Date.now()
  });
  showScreen('results');
}

function repeatSession() { startPractice(); }

const STORAGE_KEY = 'tmua_trainer_sessions_v1';
function loadSessions() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch (e) { return []; }
}
function saveSession(s) {
  const all = loadSessions(); all.push(s);
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(all.slice(-200))); } catch (e) {}
}
function clearSessions() {
  if (!confirm('Clear all session history?')) return;
  try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
  renderProgress();
}
function renderProgress() {
  const sessions = loadSessions();
  const el = document.getElementById('progress-content');
  if (sessions.length === 0) {
    el.innerHTML = '<p class="empty-stats">No sessions yet — your stats will appear here once you complete one.</p>';
    return;
  }
  const total = sessions.length;
  const totalProblems = sessions.reduce((a, s) => a + s.count, 0);
  const totalCorrect = sessions.reduce((a, s) => a + s.correct, 0);
  const avgAcc = Math.round((totalCorrect / totalProblems) * 100);
  const avgSpeed = (sessions.reduce((a, s) => a + s.avg, 0) / sessions.length).toFixed(1);
  el.innerHTML = `
    <div class="stats-grid">
      <div class="stat"><div class="stat-label">Sessions</div><div class="stat-value">${total}</div></div>
      <div class="stat"><div class="stat-label">Problems</div><div class="stat-value">${totalProblems}</div></div>
      <div class="stat"><div class="stat-label">Avg Accuracy</div><div class="stat-value">${avgAcc}%</div></div>
      <div class="stat"><div class="stat-label">Avg Speed</div><div class="stat-value">${avgSpeed}<span style="font-size:14px;color:var(--muted)">s</span></div></div>
    </div>
    <button class="clear-btn" onclick="clearSessions()">Clear History</button>
  `;
}

renderCategories();
renderProgress();
</script>
